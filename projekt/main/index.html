<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
    <link rel="icon" href="../../shared/celesteBadelinePFP.png" >
    <title>Haiii :p</title>
  </head>
  <body>
    <div class="desktop">
      <div id="cristofferIcon" class="desktopIcon">
        <img src="content/cristoffer.jpg" alt="cristoffer" />
        <p>christoffer.jpg</p>
      </div>

      <div id="cristofferWindow" class="window dragable resizable">
        <div class="topBar">
          <div class="windowTitle">
            <img src="content/cristoffer.jpg" alt="cristoffer" />
            <p>christoffer.jpg</p>
          </div>
          <div class="buttonGroup">
            <button onclick="rightButtonGroup('cristofferWindow','hideWindow')" class="buttonHide">
              <img src="content/minimise.png" alt="" />
            </button>
            <button
              onclick="rightButtonGroup('cristofferWindow','fullScreenWindow')"
              class="buttonFullscreen"
            >
              <img src="content/maximise.png" alt="" />
            </button>
            <button
              onclick="rightButtonGroup('cristofferWindow','closeWindow')"
              class="buttonClose"
            >
              <img src="content/close.png" alt="" />
            </button>
          </div>
        </div>

        <div class="windowContent">
          <img src="content/cristoffer.jpg" alt="cristoffer" />
        </div>

        <div
          class="handle n-resize"
          style="
            position: absolute;
            top: 0px;
            height: 4px;
            width: calc(100% - 8px);
            cursor: n-resize;
          "
        ></div>
        <div
          class="handle sw-resize"
          style="
            position: absolute;
            top: 0px;
            right: 0px;
            height: 4px;
            width: 4px;
            cursor: sw-resize;
          "
        ></div>
        <div
          class="handle e-resize"
          style="
            position: absolute;
            right: 0px;
            top: 0px;
            height: calc(100% - 8px);
            width: 4px;
            cursor: e-resize;
          "
        ></div>
        <div
          class="handle se-resize"
          style="
            position: absolute;
            bottom: 0px;
            right: 0px;
            height: 4px;
            width: 4px;
            cursor: se-resize;
          "
        ></div>
        <div
          class="handle s-resize"
          style="
            position: absolute;
            bottom: 0px;
            height: 4px;
            width: calc(100% - 8px);
            cursor: s-resize;
          "
        ></div>
        <div
          class="handle sw-resize"
          style="
            position: absolute;
            bottom: 0px;
            left: 0px;
            height: 4px;
            width: 4px;
            cursor: sw-resize;
          "
        ></div>
        <div
          class="handle w-resize"
          style="
            position: absolute;
            top: 0px;
            left: 0px;
            height: calc(100% - 8px);
            width: 4px;
            cursor: w-resize;
          "
        ></div>
        <div
          class="handle nw-resize"
          style="
            position: absolute;
            top: 0px;
            left: 0px;
            height: 4px;
            width: 4px;
            cursor: nw-resize;
          "
        ></div>
      </div>
    </div>

    <div class="taskbar" style="z-index: 9000">
      <button onclick="myFunction()" class="startButton target">
        <img class="target" src="content/start.png" alt="windows logo" />
        <p class="target">START</p>
      </button>

      <div class="clock-container">
        <p id="time">13:37</p>
      </div>
    </div>
    <div class="startMenu">
      <div id="startButtonContent" class="droppDownContent">
        woow wjkw kwkw kwkwkw
      </div>
    </div>

    <style>

    </style>    

<script>
      //https://www.w3schools.com/howto/howto_js_dropdown.asp
      /* When the user clicks on the button,
        toggle between hiding and showing the dropdown content */
      function myFunction() {
        document.getElementById("startButtonContent").classList.toggle("show");
      }

      // Close the dropdown menu if the user clicks outside of it
      window.onclick = function (event) {
        if (!event.target.matches(".target")) {
          var dropdowns = document.getElementsByClassName("droppDownContent");
          var i;
          for (i = 0; i < dropdowns.length; i++) {
            var openDropdown = dropdowns[i];
            if (openDropdown.classList.contains("show")) {
              openDropdown.classList.remove("show");
            }
          }
        }
      };
    </script>
    <script src="main.js"></script>
  </body>
</html>
