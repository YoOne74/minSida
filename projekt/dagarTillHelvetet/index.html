  <body>
    <div class="container">
      <div id="mainCountdown">
        <h1>There is:</h1>
        <div class="timeList">
          <div class="timeRow">
            <p class="time" id="timeleftD">69</p>
            <p> days</p>
          </div>
          <div class="timeRow">
            <p class="time" id="timeleftH">1337</p>
            <p> hours</p>
          </div>
          <div class="timeRow">
            <p class="time" id="timeleftM">5999</ap>
            <p> minutes</p>
          </div>
          <div class="timeRow">
            <p class="time" id="timeleftS">7654321</p>
            <p> seconds</p>
          </div>
        </div>
        <p style="text-align: end;">left until school starts on the 19:th of august</p>
      </div>
    </div>
  </body>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #181a1b;
      margin: auto;
      .container {
        height: 100vh;
        width: 100vw;
        top:0px;
      #mainCountdown {
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;
    
        width: 50vw;
        min-height: 70vh;
        color: white;
        margin:auto;
          
        padding-top:25vh;
        h1 {
          font-size: 5vh;
          margin: 0;
        }

        .timeList {
          display:flex;
          flex-direction:row;

          width:100%;

          justify-content: space-between;
          align-items: space-between;

          .timeRow {
            display:flex;
            justify-content:center;
            align-items:end;
            width:25%;

            p {
              margin:0;
            }
            .time {
              font-size:7vh;
              margin:0;
            }
            #timeleftD {
              font-size:8vh;
            }
            #timeleftH {
              font-size:7vh;
            }
            #timeleftM {
              font-size:6vh;
            }
            #timeleftS {
              font-size:5vh;
            }
          }
        }
      }
    }
  }
  </style>
  <script>
    function display() {
      function calculateDaysFromToday(endDate) {
        let currentDate = new Date();
        let end = new Date(endDate);
        let timeDifference = end - currentDate;
        let daysDifference = timeDifference / (1000 * 3600 * 24);
        return daysDifference;
      }

      // Example usage
      let endDate = "2026-08-19";
      let daysUntilEndDate = Math.ceil(calculateDaysFromToday(endDate));
      let hoursUntilEndDate = Math.ceil(calculateDaysFromToday(endDate) * 24);
      let minutesUntilEndDate = Math.ceil(calculateDaysFromToday(endDate) * 60);
      let secondsUntilEndDate = Math.ceil(
        calculateDaysFromToday(endDate) * 24 * 3600,
      );

      document.getElementById("timeleftD").textContent =
        `${daysUntilEndDate}`;
      document.getElementById("timeleftH").textContent =
        `${hoursUntilEndDate}`;
      document.getElementById("timeleftM").textContent =
        `${minutesUntilEndDate}`;
      document.getElementById("timeleftS").textContent =
        `${secondsUntilEndDate}`;
    }

    var t = setInterval(display, 1000);
  </script>
